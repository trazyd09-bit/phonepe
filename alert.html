<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alerts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.95);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .help-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px; /* Space for bottom nav */
            overflow-y: auto;
            scrollbar-width: none;
        }

        main::-webkit-scrollbar {
            display: none;
        }

        .empty-state {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mailbox-container {
            position: relative;
            width: 220px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Image sizing maintained from original SVG class */
        .illustration-svg {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .status-text {
            font-size: 18px;
            color: #E0E0E0;
            font-weight: 400;
            margin-top: 10px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85px;
            background-color: #0c0c0c;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 12px;
            border-top: 1px solid #1a1a1a;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #9e9e9e;
            width: 20%;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-icon {
            width: 26px;
            height: 26px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* QR Center Button */
        .qr-button-container {
            position: relative;
            top: -5px;
        }

        .qr-circle {
            width: 54px;
            height: 54px;
            background: #8e44ad; /* Purple gradient base */
            background: linear-gradient(135deg, #5F259F 0%, #5F259F 0%);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
        }

        .qr-icon-svg {
            width: 28px;
            height: 28px;
            stroke: #fbc8ff;
        }

        /* Responsive adjustments */
        @media (max-width: 360px) {
            .nav-label { font-size: 10px; }
            .header-title { font-size: 22px; }
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker Registered'))
            .catch(err => console.log('Service Worker Registration Failed', err));
        });
      }
    </script>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-title">Alerts</div>
        <div class="help-icon">
            <div class="top-meta-icons">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M12 17H12.01M12 14C12.8906 12.0938 15 12.2344 15 10C15 8.5 14 7 12 7C10.4521 7 9.50325 7.89844 9.15332 9M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
            </div>
        </div>
    </header>

    <main>
        <div class="empty-state">
            <div class="mailbox-container">
                <img class="illustration-svg" src="https://lh3.googleusercontent.com/u/0/d/1qYkhgVdgksvo0BkTyNbKVW3t1zN25Gxg" alt="Alerts Illustration">
            </div>
            <div class="status-text">All caught up</div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <div class="nav-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="currentColor">
                    <path d="M 23.951172 4 A 1.50015 1.50015 0 0 0 23.072266 4.3222656 L 8.859375 15.519531 C 7.0554772 16.941163 6 19.113506 6 21.410156 L 6 40.5 C 6 41.863594 7.1364058 43 8.5 43 L 18.5 43 C 19.863594 43 21 41.863594 21 40.5 L 21 30.5 C 21 30.204955 21.204955 30 21.5 30 L 26.5 30 C 26.795045 30 27 30.204955 27 30.5 L 27 40.5 C 27 41.863594 28.136406 43 29.5 43 L 39.5 43 C 40.863594 43 42 41.863594 42 40.5 L 42 21.410156 C 42 19.113506 40.944523 16.941163 39.140625 15.519531 L 24.927734 4.3222656 A 1.50015 1.50015 0 0 0 23.951172 4 z M 24 7.4101562 L 37.285156 17.876953 C 38.369258 18.731322 39 20.030807 39 21.410156 L 39 40 L 30 40 L 30 30.5 C 30 28.585045 28.414955 27 26.5 27 L 21.5 27 C 19.585045 27 18 28.585045 18 30.5 L 18 40 L 9 40 L 9 21.410156 C 9 20.030807 9.6307412 18.731322 10.714844 17.876953 L 24 7.4101562 z"></path>
                </svg>
            </div>
            <span class="nav-label">Home</span>
        </a>

        <a href="search.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="grey" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,2c-4.4094,0 -8,3.59061 -8,8c0,4.40939 3.5906,8 8,8c1.92974,0 3.63578,-0.77488 5.01953,-1.91797l5.36133,5.35938l0.53125,0.53125l1.06055,-1.06055l-0.53125,-0.53125l-5.35937,-5.36133c1.14309,-1.38375 1.91797,-3.08979 1.91797,-5.01953c0,-4.40939 -3.5906,-8 -8,-8zM10,3.5c3.59874,0 6.5,2.90127 6.5,6.5c0,3.59873 -2.90126,6.5 -6.5,6.5c-3.59874,0 -6.5,-2.90127 -6.5,-6.5c0,-3.59873 2.90126,-6.5 6.5,-6.5z"></path>
                </svg>
            </div>
            <span class="nav-label">Search</span>
        </a>

        <a href="openqr.html" class="nav-item qr-button-container">
            <div class="qr-circle">
                <svg class="qr-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                </svg>
            </div>
        </a>

        <a href="#" class="nav-item active">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"></path>
                </svg>
            </div>
            <span class="nav-label">Alerts</span>
        </a>

        <a href="history.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <span class="nav-label">History</span>
        </a>
    </nav>
</div>

<script>
    const mainContent = document.querySelector('main');
    const header = document.querySelector('header');

    mainContent.addEventListener('scroll', () => {
        const scrollY = mainContent.scrollTop;
        const opacity = Math.min(scrollY / 100, 1);
        header.style.backgroundColor = `rgba(0, 0, 0, ${0.95 + (opacity * 0.05)})`;
    });

    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.addEventListener('touchstart', function() {
            this.style.opacity = '0.6';
        });
        item.addEventListener('touchend', function() {
            this.style.opacity = '1';
        });
    });
</script>

</body>
</html>
